<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>View Timetable - AI Timetable Generation System</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">&#128197;</div>
      AI Timetable System
    </div>
    <nav>
      <a href="dashboard.html">&#128202; Dashboard</a>
      <a href="faculty.html">&#128101; Faculty & Subjects</a>
      <a href="generate.html">&#9881; Generate Timetable</a>
      <a href="view.html" class="active">&#128196; View Timetable</a>
    </nav>
    <div class="logout" onclick="logout()">&#8592; Logout</div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <h2>View Timetable</h2>
      <div class="admin-chip"><span class="avatar">A</span> <span id="adminName">Admin</span></div>
    </div>

    <div class="card">
      <div class="view-filters">
        <div class="field">
          <label>Department</label>
          <select id="department">
            <option value="CSE">Computer Science</option>
            <option value="ECE">Electronics & Communication</option>
            <option value="MECH">Mechanical</option>
            <option value="CIVIL">Civil</option>
            <option value="IT">Information Technology</option>
          </select>
        </div>
        <div class="field">
          <label>Semester</label>
          <select id="semester">
            <option value="Semester 1">Semester 1</option>
            <option value="Semester 2">Semester 2</option>
            <option value="Semester 3">Semester 3</option>
            <option value="Semester 4">Semester 4</option>
            <option value="Semester 5">Semester 5</option>
            <option value="Semester 6">Semester 6</option>
            <option value="Semester 7">Semester 7</option>
            <option value="Semester 8">Semester 8</option>
          </select>
        </div>
        <div class="field" style="flex:0 0 auto;">
          <button class="btn-small" id="viewBtn" style="padding:10px 26px;">View</button>
        </div>
      </div>

      <div id="viewAlert" class="alert alert-error"></div>

      <div class="timetable-grid">
        <table>
          <thead>
            <tr id="tableHead"></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<script src="js/api.js"></script>
<script src="js/view.js"></script>
</body>
</html>
